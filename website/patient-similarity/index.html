<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Patient Similarity — MIMIC-IV Demo</title>
<style>
:root {
  --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
  --text: #e2e8f0; --muted: #94a3b8; --accent: #a78bfa;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }
header {
  background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
  border-bottom: 1px solid var(--surface2); padding: 24px 32px;
}
header h1 { font-size: 1.4rem; font-weight: 600; color: var(--accent); }
header p { font-size: 0.85rem; color: var(--muted); margin-top: 4px; }
.nav { padding: 12px 32px; background: var(--surface); border-bottom: 1px solid var(--surface2); font-size: 0.85rem; }
.nav a { color: var(--accent); text-decoration: none; }
.nav a:hover { text-decoration: underline; }
.container { max-width: 800px; margin: 0 auto; padding: 32px 24px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.card {
  background: var(--surface); border: 1px solid var(--surface2); border-radius: 10px;
  padding: 16px 20px; text-decoration: none; color: var(--text); display: block; transition: all .15s;
}
.card:hover { border-color: var(--accent); transform: translateY(-2px); }
.card .sid { font-size: 1rem; font-weight: 700; color: var(--accent); }
.card .meta { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }
.empty { color: var(--muted); font-size: 0.9rem; margin-top: 16px; }
.empty code { background: var(--surface2); padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; }
</style>
</head>
<body>
<header>
  <h1>Patient Similarity Comparisons</h1>
  <p>RDF2Vec cosine similarity with clinical profile comparisons</p>
</header>
<div class="nav"><a href="..">&larr; Back to home</a></div>
<div class="container">
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none;">
    <p>No similarity reports generated yet. Generate one with:</p>
    <p style="margin-top:8px;"><code>cd analysis/patient-similarity && python find_similar_patients.py &lt;patient_id&gt;</code></p>
  </div>
</div>
<script>
// Auto-detect similarity HTML files by trying known patient IDs
// This is a static page — it lists links to any generated similarity_*.html files
const knownIds = [];
const grid = document.getElementById('grid');
const emptyMsg = document.getElementById('empty');

// Try to fetch the directory listing (works with Python http.server)
fetch('./')
  .then(r => r.text())
  .then(html => {
    const matches = html.matchAll(/href="(similarity_(\d+)\.html)"/g);
    let count = 0;
    for (const m of matches) {
      count++;
      const card = document.createElement('a');
      card.className = 'card';
      card.href = m[1];
      card.innerHTML = `<div class="sid">Subject ${m[2]}</div><div class="meta">Similarity comparison report</div>`;
      grid.appendChild(card);
    }
    if (count === 0) emptyMsg.style.display = 'block';
  })
  .catch(() => { emptyMsg.style.display = 'block'; });
</script>
</body>
</html>
